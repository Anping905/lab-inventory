<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华南中心实验物资库存管理系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f0f4f8;color:#333}

/* Login */
.login-page{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#003f72,#006daa,#4faad5)}
.login-box{background:#fff;border-radius:20px;padding:40px;width:400px;max-width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-box h1{font-size:24px;color:#003f72;text-align:center;margin-bottom:6px}
.login-box .sub{text-align:center;color:#999;font-size:14px;margin-bottom:28px}
.login-box label{display:block;font-size:14px;font-weight:bold;margin:14px 0 4px;color:#555}
.login-box input{width:100%;padding:12px 14px;border:2px solid #d0d7de;border-radius:10px;font-size:15px;outline:none;transition:0.2s}
.login-box input:focus{border-color:#006daa}
.login-box .login-btn{width:100%;padding:12px;background:#006daa;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:24px;transition:0.2s}
.login-box .login-btn:hover{background:#00568a}
.login-box .error{color:#c0392b;font-size:13px;margin-top:10px;text-align:center;display:none}

/* Header */
.header{background:linear-gradient(135deg,#003f72,#006daa);color:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:20px}
.header .user-info{display:flex;align-items:center;gap:12px}
.header .user-info .role-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:bold}
.header .stats{display:flex;gap:12px;flex-wrap:wrap}
.header .stat-item{background:rgba(255,255,255,0.15);padding:5px 12px;border-radius:8px;text-align:center}
.header .stat-item .num{font-size:16px;font-weight:bold}
.header .stat-item .label{font-size:11px;opacity:0.8}
.btn-logout{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px}
.btn-logout:hover{background:rgba(255,255,255,0.3)}
.pending-badge{display:inline-flex;align-items:center;justify-content:center;background:#c0392b;color:#fff;border-radius:50%;width:22px;height:22px;font-size:12px;font-weight:bold}

.container{max-width:1440px;margin:0 auto;padding:10px}
.tabs{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:8px 8px 0 0;cursor:pointer;font-size:14px;font-weight:bold;background:#dde5ed;color:#555;border:none;transition:0.2s}
.tab:hover{background:#c8d4e0}
.tab.active{background:#006daa;color:#fff}
.tab .badge{display:inline-block;background:rgba(0,0,0,0.15);border-radius:10px;padding:0 6px;font-size:11px;margin-left:4px}
.tab.active .badge{background:rgba(255,255,255,0.25)}

.toolbar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.toolbar input{flex:1;min-width:160px;padding:7px 10px;border:2px solid #d0d7de;border-radius:8px;font-size:13px;outline:none}
.toolbar input:focus{border-color:#006daa}
.btn{padding:7px 14px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:bold;transition:0.2s;display:inline-flex;align-items:center;gap:5px}
.btn-sm{padding:4px 8px;font-size:12px}
.btn-primary{background:#006daa;color:#fff}
.btn-primary:hover{background:#00568a}
.btn-success{background:#2e8b57;color:#fff}
.btn-success:hover{background:#237044}
.btn-danger{background:#c0392b;color:#fff}
.btn-danger:hover{background:#a03022}
.btn-warning{background:#e86c00;color:#fff}
.btn-warning:hover{background:#c55d00}
.btn-outline{background:#fff;color:#333;border:2px solid #d0d7de}
.btn-outline:hover{background:#f0f4f8}
.btn-ghost{background:transparent;color:#006daa;border:1px solid #006daa}
.btn-ghost:hover{background:#e8f0f8}

.table-wrap{background:#fff;border-radius:10px;overflow:auto;box-shadow:0 2px 8px rgba(0,0,0,0.06);max-height:62vh}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#f7f9fb;padding:8px 6px;text-align:left;font-weight:bold;color:#555;border-bottom:2px solid #e4e9ef;white-space:nowrap;position:sticky;top:0;z-index:1}
tbody td{padding:6px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
tbody tr:hover{background:#f7fafc}
tbody tr.low-stock{background:#fff5f5}
tbody tr.low-stock:hover{background:#ffe8e8}
tbody tr.expired-row{background:#fff8f0}
.num-cell{text-align:right;font-family:'Consolas',monospace}
.actions{display:flex;gap:3px;flex-wrap:nowrap}
.low-tag{display:inline-block;background:#c0392b;color:#fff;font-size:9px;padding:1px 4px;border-radius:3px}
.expired-tag{display:inline-block;background:#e86c00;color:#fff;font-size:9px;padding:1px 4px;border-radius:3px}
.batch-cell{font-size:11px;color:#666;max-width:100px}
.expiry-cell{font-size:11px}
.expiry-warning{color:#c0392b;font-weight:bold}
.expiry-ok{color:#2e8b57}
/* Grouped item rows */
.item-group{background:#f7fafc;font-weight:bold}
.item-group td{border-top:2px solid #d0d7de;padding:8px 6px}
.item-group .group-name{font-size:14px;cursor:pointer;user-select:none}
.item-group .group-name:hover{color:#006daa}
.batch-sub td{font-size:11px;padding:4px 6px 4px 24px;background:#fafcfe;border-bottom:1px solid #eee}
.batch-sub:hover{background:#f0f6fc}
.batch-sub .num-cell{font-size:11px}
.batch-sub .batch-label{color:#666}
.toggle-icon{display:inline-block;width:16px;text-align:center;color:#999;font-size:11px}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;max-width:520px;width:90%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal h2{font-size:20px;margin-bottom:4px;color:#003f72}
.modal .sub{font-size:13px;color:#888;margin-bottom:12px}
.modal label{display:block;font-size:13px;font-weight:bold;margin:8px 0 3px;color:#555}
.modal input[type=number],.modal input[type=text],.modal input[type=date],.modal textarea,.modal select{width:100%;padding:7px 10px;border:2px solid #d0d7de;border-radius:8px;font-size:13px;outline:none;font-family:inherit}
.modal input:focus,.modal select:focus{border-color:#006daa}
.modal .btn-row{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.modal .current-stock{font-size:13px;color:#666;margin:6px 0;padding:6px 10px;background:#f7f9fb;border-radius:8px}
.modal .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

.empty-state{text-align:center;padding:40px 20px;color:#999}
.empty-state .icon{font-size:40px;margin-bottom:8px}
.toast{position:fixed;bottom:24px;right:24px;background:#2e8b57;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:bold;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:2000;transform:translateY(80px);opacity:0;transition:0.3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:#c0392b}

/* Approval */
.approval-panel{background:#fff;border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.approval-panel h3{font-size:15px;color:#003f72;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.request-card{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f7fafc;border-radius:8px;margin-bottom:5px;border-left:4px solid #e86c00;flex-wrap:wrap;gap:6px}
.request-card .info{flex:1;min-width:180px}
.request-card .info .name{font-weight:bold;font-size:13px}
.request-card .info .detail{font-size:12px;color:#888;margin-top:1px}
.request-card .info .meta{font-size:11px;color:#aaa;margin-top:1px}
.request-card .btns{display:flex;gap:5px;flex-shrink:0}

/* Report */
.report-section{margin-top:14px}
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.summary-card{background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.summary-card .num{font-size:24px;font-weight:bold;color:#003f72}
.summary-card .label{font-size:12px;color:#888;margin-top:3px}
.chart-card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:10px}
.chart-card h3{font-size:14px;color:#003f72;margin-bottom:8px}
.supplier-tag{display:inline-block;background:#e8f0f8;color:#006daa;font-size:10px;padding:1px 5px;border-radius:3px;margin-left:3px}
</style>
</head>
<body>

<!-- Login Page -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <h1>🧪 实验物资库存管理</h1>
    <div class="sub">华南中心 · 请登录您的账号</div>
    <label>账号</label>
    <input type="text" id="loginUser" placeholder="请输入账号">
    <label>密码</label>
    <input type="password" id="loginPass" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">登 录</button>
    <div class="error" id="loginError">账号或密码错误，请重试</div>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">
<div class="header" id="appHeader">
  <div>
    <h1>🧪 华南中心实验物资库存管理</h1>
    <div style="font-size:12px;opacity:0.7;margin-top:2px">支持批号/效期/供应商追踪 · 数据自动保存</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div class="stats" id="headerStats"></div>
    <div class="user-info" id="userInfo">
      <span class="role-tag" id="roleTag">管理员</span>
      <span id="userName">admin</span>
      <button class="btn-logout" onclick="doLogout()">退出</button>
    </div>
  </div>
</div>

<div class="container">
  <div id="approvalPanel" style="display:none"></div>
  <div class="tabs" id="tabBar"></div>
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍 搜索名称、品牌、批号..." oninput="renderTable()">
    <button class="btn btn-outline btn-sm" onclick="exportData()">📥 CSV</button>
    <button class="btn btn-primary btn-sm" onclick="exportAll()">💾 导出</button>
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">📂 导入</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importAll(event)">
    <button class="btn btn-ghost btn-sm" id="syncBtn" onclick="openSyncSettings()">☁️ 同步设置</button>
    <button class="btn btn-primary btn-sm" id="monthlyReportBtn" onclick="toggleReport()">📊 月度统计</button>
    <button class="btn btn-outline btn-sm" id="myStatsBtn" onclick="toggleMyStats()" style="display:none">📋 我的领用</button>
    <button class="btn btn-success btn-sm" id="newItemBtn" onclick="openNewItemModal()" style="display:none">➕ 新增物品</button>
  </div>
  <div class="table-wrap" id="tableWrap">
    <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
  </div>
  <div id="reportSection" style="display:none"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <div class="sub" id="modalSub"></div>
    <div class="current-stock" id="modalStock" style="display:none"></div>
    <div id="modalExtraFields"></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn" id="modalConfirmBtn" onclick="confirmModal()"></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
</div>

const GH_OWNER='Anping905',GH_REPO='lab-inventory',GH_FILE='sync-data.json';
function loadSyncConfig(){

async function ghApi(method,path,token,body){
  const opts={method,headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}};
  if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body)}
  const r=await fetch('https://api.github.com'+path,opts);
  const j=await r.json();
  if(!r.ok)throw new Error(j.message||'HTTP '+r.status);
  return j;
}

async function uploadToGitHub(token){
  const status=document.getElementById('syncStatus');
  status.textContent='⏳ 正在上传...';
  try{
    if(!token&&syncConfig)token=syncConfig.token;
    if(!token&&document.getElementById('ghToken'))token=document.getElementById('ghToken').value.trim();
    if(!token){status.textContent='❌ 请填写 Token';return}
    const content=btoa(unescape(encodeURIComponent(JSON.stringify({data:currentData,requests,time:new Date().toISOString()}))));
    // Try to update existing file first
    try{
      const existing=await ghApi('GET','/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE,token);
      await ghApi('PUT','/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE,token,{message:'sync update',content,sha:existing.sha});
    }catch(e){
      if(e.message&&e.message.includes('Not Found')){
        await ghApi('PUT','/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE,token,{message:'sync create',content});
      }else{throw e}
    }
    status.textContent='✅ 上传成功！';
    showToast('☁️ 数据已上传到 GitHub');
  }catch(e){status.textContent='❌ 上传失败：'+e.message;showToast('上传失败：'+e.message,true)}
}

async function downloadFromGitHub(token){
  const status=document.getElementById('syncStatus');
  status.textContent='⏳ 正在下载...';
  try{
    if(!token&&syncConfig)token=syncConfig.token;
    if(!token&&document.getElementById('ghToken'))token=document.getElementById('ghToken').value.trim();
    if(!token){status.textContent='❌ 请填写 Token';return}
    const j=await ghApi('GET','/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE,token);
    if(!j.content){status.textContent='❌ 云端没有数据';return}
    const raw=decodeURIComponent(escape(atob(j.content)));
    const p=JSON.parse(raw);
    if(!p.data){status.textContent='❌ 数据格式不对';return}
    currentData=p.data;requests=p.requests||[];
    saveData();
    renderTabs();renderApprovalPanel();renderTable();updateStats();
    status.textContent='✅ 下载成功！';
    showToast('☁️ 数据已从 GitHub 恢复');
  }catch(e){status.textContent='❌ 下载失败：'+e.message;showToast('下载失败：'+e.message,true)}
}

function applySyncConfig(){
  const token=document.getElementById('ghToken').value.trim();
  if(!token){showToast('请填写 Token',true);return}
  syncConfig={token};saveSyncConfig();closeModal();
  clearSyncTimer();
  // Auto-sync every 60s: download then upload
  syncTimer=setInterval(()=>{
    if(!syncConfig)return;
    (async()=>{
      try{
        const j=await ghApi('GET','/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE,syncConfig.token);
        if(j.content){
          const remote=JSON.parse(decodeURIComponent(escape(atob(j.content))));
          if(remote.requests){
            const all=[...remote.requests,...requests];
            const map={};all.forEach(x=>{if(!map[x.id]||x.status==='approved')map[x.id]=x});
            requests=Object.values(map);
          }
          saveData();renderTabs();renderApprovalPanel();renderTable();updateStats();
        }
        const c=btoa(unescape(encodeURIComponent(JSON.stringify({data:currentData,requests}))));
        const e=await ghApi('GET','/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE,syncConfig.token).catch(()=>null);
        await ghApi('PUT','/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE,syncConfig.token,{message:'auto sync',content:c,sha:e?e.sha:undefined});
      }catch(e){}
    })();
  },60000);
  showToast('☁️ 自动同步已开启（每60秒先下载再上传）');
  uploadToGitHub().catch(()=>{});
}

// ==================== MIGRATION ====================
function migrateToBatches(data){
  ['consumables','reagents','supplies','uncommon'].forEach(key=>{
    const items=data[key];if(!items||!items.length)return;
    const map={};
    items.forEach(item=>{
      const n=item.name;
      if(!map[n])map[n]={level:item.level||99,cat:item.cat||'',name:n,brand:item.brand||'',spec:item.spec||'',unit:item.unit||'',stock:0,total:0,batches:[]};
      const g=map[n];const q=item.stock||0;const p=item.price||0;
      g.stock+=q;g.total+=+(q*p).toFixed(2);
      g.batches.push({qty:q,price:p,batch:item.batch||'',expiry:item.expiry||'',loc:item.loc||'',supplier:item.supplier||'',note:item.note||''});
    });
    data[key]=Object.values(map);
  });
}

function clearAllLocations(data){
  ['consumables','reagents','supplies','uncommon'].forEach(key=>{
    (data[key]||[]).forEach(item=>{
      delete item.loc;
      (item.batches||[]).forEach(b=>{delete b.loc});
    });
  });
}

  document.getElementById('myStatsBtn').style.display=isAdmin?'none':'';
  document.getElementById('newItemBtn').style.display=isAdmin?'':'none';
  renderTabs();renderApprovalPanel();renderTable();updateStats();
  reportVisible=false;document.getElementById('reportSection').style.display='none';

          const j=await ghApi('GET','/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE,syncConfig.token);
          if(j.content){
            const r=JSON.parse(decodeURIComponent(escape(atob(j.content))));
            if(r.requests){const all=[...r.requests,...requests];const m={};all.forEach(x=>{if(!m[x.id]||x.status==='approved')m[x.id]=x});requests=Object.values(m)}
            saveData();renderTabs();renderApprovalPanel();renderTable();updateStats()
          }
          const c=btoa(unescape(encodeURIComponent(JSON.stringify({data:currentData,requests}))));
          const e=await ghApi('GET','/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE,syncConfig.token).catch(()=>null);
          await ghApi('PUT','/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE,syncConfig.token,{message:'auto sync',content:c,sha:e?e.sha:undefined});
        }catch(e){}
      })();

function renderApprovalPanel(){
  const p=document.getElementById('approvalPanel');
  if(currentUser.role!=='admin'){p.style.display='none';return}
  p.style.display='block';
  const pending=requests.filter(r=>r.status==='pending');
  if(pending.length===0){
    p.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0"><span style="color:#888;font-size:14px">✅ 暂无待审批的领用申请</span><button class="btn btn-outline btn-sm" onclick="refreshApproval()">🔄 刷新</button></div>';return
  }
  p.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <h3 style="font-size:15px;color:#003f72;display:flex;align-items:center;gap:8px">📋 待审批领用申请 <span class="pending-badge">${pending.length}</span></h3>
    <button class="btn btn-outline btn-sm" onclick="refreshApproval()">🔄 刷新</button>
  </div>
    ${pending.map(r=>`<div class="request-card">
      <div class="info">
        <div class="name">${r.teamName} — ${r.itemName} <span class="supplier-tag">批号:${r.itemBatch||'N/A'}</span></div>
        <div class="detail">领用 <b>${r.qty}</b> ${r.itemUnit}${r.reason?'（'+r.reason+'）':''}</div>
        <div class="meta">${r.date} ${r.time}</div>
      </div>
      <div class="btns">
        <button class="btn btn-success btn-sm" onclick="approveReq(${r.id})">✅ 批准</button>
        <button class="btn btn-danger btn-sm" onclick="rejectReq(${r.id})">❌ 拒绝</button>
      </div>
    </div>`).join('')}`;
}
function approveReq(id){
  const r=requests.find(x=>x.id===id);if(!r)return;
  r.status='approved';r.approvedDate=new Date().toISOString().slice(0,10);
  const items=currentData[r.itemKey];
  if(items&&items[r.itemIdx]!==undefined){
    const item=items[r.itemIdx];
    const b=item.batches.find(x=>x.batch===r.itemBatch);
    if(b){b.qty-=r.qty;if(b.qty<0)b.qty=0}
    item.stock=item.batches.reduce((s,x)=>s+x.qty,0);
    item.total=+item.batches.reduce((s,x)=>s+x.qty*x.price,0).toFixed(2);
  }
  saveData();renderApprovalPanel();renderTable();updateStats();
  showToast(`✅ 已批准：${r.teamName} 领用 ${r.itemName} × ${r.qty}`);
}
function rejectReq(id){
  const r=requests.find(x=>x.id===id);if(!r)return;
  r.status='rejected';saveData();renderApprovalPanel();
  showToast('已拒绝领用申请');
}

// ==================== HELPERS ====================
function parseDate(s){
  if(!s)return null;
  const d=new Date(s.replace(/\//g,'-').trim());
  return isNaN(d.getTime())?null:d;
}
function daysUntilExpiry(expiry){
  const d=parseDate(expiry);return d?Math.ceil((d-new Date())/(864e5)):null;
}

// ==================== TABLE (Grouped by name, batches as sub-rows) ====================
function renderTable(){
  const s=document.getElementById('searchInput').value.trim().toLowerCase();
  const items=currentData[currentTab]||[];
  const isAdmin=currentUser.role==='admin';
  const thead=document.getElementById('thead');
  const tbody=document.getElementById('tbody');

  thead.innerHTML='<tr><th>#</th><th>名称 / 批次明细</th><th>品牌</th><th>规格</th><th>单位</th><th style="text-align:right">总库存</th><th style="text-align:right">总价值</th><th>操作</th></tr>';

  if(items.length===0){
    tbody.innerHTML='<tr><td colspan="8"><div class="empty-state"><div class="icon">📭</div><div>没有匹配的物资</div></div></td></tr>';
    return;
  }

  let hasVisible=false;
  let html='';
  items.forEach((x,i)=>{
    const match=!s||(x.name+' '+x.brand+' '+x.cat+' '+x.spec+' '+x.unit).toLowerCase().includes(s);
    if(match)hasVisible=true;
    const displayStyle=match?'':'style="display:none"';
    const low=x.stock>0&&x.stock<=5;
    const toggleId='tg'+currentTab+i;
    const activeBatches=x.batches.filter(b=>b.qty>0);
    // Main group row
    html+=`<tr class="item-group ${low?'low-stock':''}" ${displayStyle} data-ridx="${i}">
      <td>${i+1}</td>
      <td class="group-name" onclick="toggleBatches('${toggleId}')">
        <span class="toggle-icon" id="${toggleId}_icon">▶</span>
        <strong>${x.name}</strong>${low?'<span class="low-tag">库存不足</span>':''}
      </td>
      <td>${x.brand||''}</td>
      <td style="font-size:11px;max-width:150px">${x.spec||''}</td>
      <td>${x.unit||''}</td>
      <td class="num-cell"><strong>${x.stock}</strong></td>
      <td class="num-cell">¥${x.total.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}</td>
      <td class="actions">
        ${isAdmin
          ? `<button class="btn btn-success btn-sm" onclick="openModal('in',${i})">+入库</button>
             ${x.stock===0?'':`<button class="btn btn-ghost btn-sm" onclick="openModal('request',${i})">📝 领用</button>`}`
          : (x.stock===0?'<span style="font-size:11px;color:#999">无库存</span>'
             :`<button class="btn btn-ghost btn-sm" onclick="openModal('request',${i})">📝 领用</button>`)}
      </td>
    </tr>`;
    // Batch sub-rows
    html+=`<tbody id="${toggleId}" style="display:none">`;
    activeBatches.forEach((b,j)=>{
      const days=daysUntilExpiry(b.expiry);
      const nearExp=days!==null&&days>0&&days<=90;
      html+=`<tr class="batch-sub${nearExp?' expired-row':''}">
        <td></td>
        <td><span class="batch-label">└ 批次${j+1}：</span>${b.batch||'—'} ${b.expiry?`<span class="${nearExp?'expiry-warning':'expiry-ok'}">${b.expiry}</span>`:''}${nearExp?` <span class="expired-tag">${days}天</span>`:''}</td>
        <td colspan="2"><span class="batch-label">供应商：</span>${b.supplier||'—'} ${b.price>0?`| ¥${b.price.toFixed(2)}/${x.unit}`:'| 赠品'}</td>
        <td></td>
        <td class="num-cell"><span class="batch-label">数量：</span>${b.qty}</td>
        <td class="num-cell"><span class="batch-label">金额：</span>¥${(b.qty*b.price).toFixed(0)}</td>
        <td></td>
      </tr>`;
    });
    html+=`</tbody>`;
  });
  if(!hasVisible){
    tbody.innerHTML='<tr><td colspan="8"><div class="empty-state"><div class="icon">🔍</div><div>没有找到匹配的物资</div></div></td></tr>';
  }else{
    tbody.innerHTML=html;
  }
}

function toggleBatches(id){
  const tbody=document.getElementById(id);
  const icon=document.getElementById(id+'_icon');
  if(tbody.style.display==='none'){
    tbody.style.display='table-row-group';
    icon.textContent='▼';
  }else{
    tbody.style.display='none';
    icon.textContent='▶';
  }
}

    document.getElementById('modalStock').textContent=`当前总库存：${modalItem.stock} ${modalItem.unit||''}（${modalItem.batches.filter(b=>b.qty>0).length}个批次）`;
    document.getElementById('modalExtraFields').innerHTML=`
      <div class="form-row">
        <div><label>入库数量</label><input type="number" id="modalQty" min="1" value="1"></div>
        <div><label>单价 (¥)（赠品填0）</label><input type="number" id="modalPrice" step="0.01" min="0" value="${lastBatch.price||0}"></div>
      </div>
      <div class="form-row">
        <div><label>批号</label><input type="text" id="modalBatch" placeholder="新批号（留空归入默认）"></div>
        <div><label>效期</label><input type="date" id="modalExpiry"></div>
      </div>
      <div class="form-row">
        <div><label>存放地点</label><input type="text" id="modalLoc" value="${lastBatch.loc||modalItem.batches[0]?.loc||''}"></div>
        <div><label>供应商</label><input type="text" id="modalSupplier" value="${lastBatch.supplier||''}"></div>
      </div>
      <label>备注</label><input type="text" id="modalReason" placeholder="批次说明">
    `;
    const btn=document.getElementById('modalConfirmBtn');
    btn.textContent='✅ 确认入库';btn.className='btn btn-success';
  }else if(mode==='request'){
    const batchOpts=modalItem.batches.filter(b=>b.qty>0).map((b,i)=>`<option value="${i}">${b.batch||'默认'}（余${b.qty}，¥${b.price.toFixed(2)}）</option>`).join('');
    document.getElementById('modalTitle').textContent='📝 申请领用';
    document.getElementById('modalSub').textContent=`${modalItem.name} | ${modalItem.brand||''} ${modalItem.spec||''}`;
    document.getElementById('modalStock').textContent=`当前总库存：${modalItem.stock} ${modalItem.unit||''}`;
    document.getElementById('modalExtraFields').innerHTML=`
      <label>选择批次</label>

      <label>用途说明</label><textarea id="modalReason" rows="3" placeholder="请说明用途"></textarea>
    `;

        const bi=parseInt(sel.value);
        qtyInput.max=modalItem.batches.filter(b=>b.qty>0)[bi]?.qty||modalItem.stock;
      };
      sel.onchange();
    },50);

  }

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
}

function confirmModal(){
  // ---- Sync Config ----
  if(modalMode==='syncConfig'){applySyncConfig();return}

  // ---- New Item ----
  if(modalMode==='newItem'){
    const cat=document.getElementById('niCat').value.trim();
    const name=document.getElementById('niName').value.trim();
    const brand=document.getElementById('niBrand').value.trim();
    const spec=document.getElementById('niSpec').value.trim();
    const unit=document.getElementById('niUnit').value.trim()||'个';
    const price=parseFloat(document.getElementById('niPrice').value);
    const qty=parseInt(document.getElementById('niQty').value)||0;
    const loc=document.getElementById('niLoc').value.trim();
    const batch=document.getElementById('niBatch').value.trim()||'N/A';
    const expiry=document.getElementById('niExpiry').value;
    const supplier=document.getElementById('niSupplier').value.trim();
    if(!name){showToast('请填写物品名称',true);return}
    if(price<0){showToast('请输入有效价格',true);return}
    const items=currentData[currentTab];
    const item={level:99,cat:cat||'其他',name,brand,spec,unit,stock:qty,total:+(price*qty).toFixed(2),batches:[{qty,price,batch:batch||'默认',expiry:expiry||'',loc:loc||'',supplier:supplier||'',note:''}]};
    items.push(item);
    saveData();closeModal();renderTabs();renderTable();updateStats();
    showToast(`✅ 已新增：${name}`);
    return;
  }

  // ---- Inbound (batches structure) ----
  if(modalMode==='in'){
    const qty=parseInt(document.getElementById('modalQty').value);
    const price=parseFloat(document.getElementById('modalPrice').value);
    const batch=document.getElementById('modalBatch').value.trim();
    const expiry=document.getElementById('modalExpiry').value;
    const loc=document.getElementById('modalLoc').value.trim();
    const supplier=document.getElementById('modalSupplier').value.trim();
    if(!qty||qty<1||price<0){showToast('请填写有效数量',true);return}
    const item=currentData[currentTab][modalIdx];
    // Check if batch exists in this item
    if(batch){
      const eb=item.batches.find(b=>b.batch===batch);
      if(eb){
        eb.qty+=qty;eb.price=price;
        if(expiry)eb.expiry=expiry;
        if(loc)eb.loc=loc;
        if(supplier)eb.supplier=supplier;
        showToast(`✅ 入库成功：${item.name} 批次 ${batch} +${qty}`);
      }else{
        item.batches.push({qty,price,batch,expiry:expiry||'',loc:loc||'',supplier:supplier||'',note:''});
        showToast(`✅ 入库成功：${item.name} 新批次 ${batch} +${qty}`);
      }
    }else{
      // No batch → add to first batch or create default
      const def=item.batches.find(b=>!b.batch||b.batch==='N/A'||b.batch==='默认');
      if(def){
        def.qty+=qty;def.price=price;
        showToast(`✅ 入库成功：${item.name}（默认批次）+${qty}`);
      }else{
        item.batches.push({qty,price,batch:'默认',expiry:expiry||'',loc:loc||'',supplier:supplier||'',note:''});
        showToast(`✅ 入库成功：${item.name}（新建默认批次）`);
      }
    }
    // Recalculate totals
    item.stock=item.batches.reduce((s,b)=>s+b.qty,0);
    item.total=+item.batches.reduce((s,b)=>s+b.qty*b.price,0).toFixed(2);
    saveData();closeModal();renderTabs();renderTable();updateStats();return;
  }

  // ---- Request (batch-aware) ----
  if(modalMode==='request'){
    const bi=parseInt(document.getElementById('modalBatchSelect').value);
    const qty=parseInt(document.getElementById('modalQty').value);
    const reason=document.getElementById('modalReason').value.trim();
    if(!qty||qty<1){showToast('请输入有效数量',true);return}

    const item=currentData[currentTab][modalIdx];
    const activeBatches=item.batches.filter(b=>b.qty>0);
    const selBatch=activeBatches[bi];
    if(!selBatch||qty>selBatch.qty){showToast('该批次库存不足',true);return}
    const isAdmin=currentUser.role==='admin';
    const req={
      id:Date.now(),userId:currentUser.id,teamName:currentUser.name,
      itemKey:currentTab,itemIdx:modalIdx,itemName:item.name,
      itemSpec:item.spec||'',itemUnit:item.unit||'',
      itemBatch:selBatch.batch||'默认',qty,reason,
      status:isAdmin?'approved':'pending',
      date:new Date().toISOString().slice(0,10),
      time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
      approvedDate:isAdmin?new Date().toISOString().slice(0,10):null,
    };
    if(isAdmin){
      selBatch.qty-=qty;
      if(selBatch.qty<0)selBatch.qty=0;
      item.stock=item.batches.reduce((s,b)=>s+b.qty,0);
      item.total=+item.batches.reduce((s,b)=>s+b.qty*b.price,0).toFixed(2);
    }
    requests.push(req);
    saveData();closeModal();renderApprovalPanel();renderTable();updateStats();
    showToast(isAdmin?`✅ 领用成功：${item.name} -${qty}`:'📤 申请已提交，等待审批');
    return;
  }
}

// ==================== STATS ====================
function updateStats(){
  let totalValue=0,totalItems=0,lowStock=0,nearExp=0;
  ['consumables','reagents','supplies','uncommon'].forEach(k=>{
    (currentData[k]||[]).forEach(i=>{
      totalValue+=i.total||0;totalItems+=i.stock;
      if(i.stock>0&&i.stock<=5)lowStock++;
      (i.batches||[]).forEach(b=>{
        const d=daysUntilExpiry(b.expiry);
        if(d!==null&&d>0&&d<=90)nearExp++;
      });
    });
  });
  const pc=requests.filter(r=>r.status==='pending').length;
  document.getElementById('headerStats').innerHTML=`
    <div class="stat-item"><div class="num">¥${totalValue.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}</div><div class="label">库存总价值</div></div>
    <div class="stat-item"><div class="num">${totalItems}</div><div class="label">总库存数量</div></div>
    <div class="stat-item"><div class="num" style="color:#ff6b6b">${lowStock}</div><div class="label">⚠️ 不足</div></div>
    <div class="stat-item"><div class="num" style="color:#e86c00">${nearExp}</div><div class="label">⏰ 近效期</div></div>
    ${pc?`<div class="stat-item"><div class="num" style="color:#ffd700">${pc}</div><div class="label">⏳ 待批</div></div>`:''}`;
}

        <tbody>${months.length?months.map(m=>{const l=byMonth[m];return `<tr><td>${m}</td><td>${l.length}</td><td>${l.reduce((s,r)=>s+r.qty,0)}</td><td style="font-size:11px">${[...new Set(l.map(r=>r.itemName))].join('、')}</td></tr>`}).join(''):'<tr><td colspan="4" style="text-align:center;color:#999;padding:16px">暂无</td></tr>'}</tbody></table>

      <div class="chart-card"><h3>👥 项目组领用</h3>
        <table style="width:100%;font-size:12px"><thead><tr><th>项目组</th><th>次数</th><th>总数量</th></tr></thead>
        <tbody>${teams.length?teams.map(t=>`<tr><td>${t}</td><td>${byTeam[t].length}</td><td>${byTeam[t].reduce((s,r)=>s+r.qty,0)}</td></tr>`).join(''):'<tr><td colspan="3" style="text-align:center;color:#999;padding:16px">暂无</td></tr>'}</tbody></table>
      </div>

    </div>`;
  if(chartInstance){try{chartInstance.destroy()}catch(e){}}
  if(months.length>0){
    const labels=[...months].reverse(),counts=labels.map(m=>byMonth[m].reduce((s,r)=>s+r.qty,0));
    chartInstance=new Chart(document.getElementById('reportChart'),{type:'line',data:{labels,datasets:[{label:'领用总数',data:counts,borderColor:'#006daa',backgroundColor:'rgba(0,109,170,0.1)',fill:true,tension:0.3,pointBackgroundColor:'#006daa',pointRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,title:{display:true,text:'数量'}}}}});
  }

function toggleReport(){
  reportVisible=!reportVisible;

// ==================== EXPORT REPORT ====================
function exportReport(){
  const approved=requests.filter(r=>r.status==='approved');
  if(!approved.length){showToast('暂无领用数据可导出',true);return}
  const byMonth={};
  approved.forEach(r=>{const m=(r.approvedDate||r.date).slice(0,7);if(!byMonth[m])byMonth[m]=[];byMonth[m].push(r)});
  const months=Object.keys(byMonth).sort();
  let csv='\uFEFF月份,项目组,物品名称,批号,数量,用途,申请日期,批准日期\n';
  months.forEach(m=>{
    byMonth[m].sort((a,b)=>a.teamName.localeCompare(b.teamName)).forEach(r=>{
      csv+=`"${m}","${r.teamName}","${r.itemName}","${r.itemBatch||''}",${r.qty},"${r.reason||''}","${r.date}","${r.approvedDate||''}"\n`;
    });
  });
  // Summary rows
  csv+='\n汇总,,总计,,数量,,\n';
  months.forEach(m=>{
    const total=byMonth[m].reduce((s,r)=>s+r.qty,0);
    csv+=`"${m}","",,,"${total}",,\n`;
  });
  const teams=[...new Set(approved.map(r=>r.teamName))];
  csv+='\n项目组统计,,总计,,数量,,\n';
  teams.forEach(t=>{
    const list=approved.filter(r=>r.teamName===t);
    const total=list.reduce((s,r)=>s+r.qty,0);
    csv+=`"${t}","",,,"${total}",,\n`;
  });
  const b=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`月度领用统计_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  URL.revokeObjectURL(a.href);showToast('✅ 统计已导出');
}

// ==================== EXPORT / IMPORT ALL DATA ====================
function exportAll(){
  const data={data:currentData,requests,exportTime:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`库存数据全量备份_${new Date().toISOString().slice(0,10)}.json`;a.click();
  URL.revokeObjectURL(a.href);showToast('✅ 全部数据已导出');
}
function importAll(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const p=JSON.parse(e.target.result);
      if(!p.data||!p.requests){showToast('文件格式不对',true);return}
      if(!p.data.consumables[0]?.batches){showToast('数据版本不兼容',true);return}
      currentData=p.data;requests=p.requests;
      saveData();
      renderTabs();renderApprovalPanel();renderTable();updateStats();
      showToast('✅ 数据导入成功');
    }catch(err){showToast('导入失败：'+err.message,true)}
  };
  reader.readAsText(file);
  event.target.value='';
}

// ==================== TOAST & EXPORT ====================
function showToast(msg,err){
  const e=document.getElementById('toast');
  e.textContent=msg;e.className='toast show'+(err?' error':'');
  setTimeout(()=>e.classList.remove('show'),2500);
}
function exportData(){
  const items=currentData[currentTab]||[];
  if(!items.length){showToast('暂无数据',true);return}
  let csv='\uFEFF物品名称,品牌,规格,单位,批次,数量,单价,金额,效期,存放地点,供应商\n';
  items.forEach(i=>{
    (i.batches||[{qty:i.stock,price:0,batch:'',expiry:'',loc:'',supplier:''}]).forEach(b=>{
      csv+=`"${i.name}","${i.brand||''}","${i.spec||''}","${i.unit||''}","${b.batch||''}",${b.qty},${b.price},${(b.qty*b.price).toFixed(2)},"${b.expiry||''}","${b.loc||''}","${b.supplier||''}"\n`;
    });
  });
  const b=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`${currentTab}_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  URL.revokeObjectURL(a.href);showToast('✅ 已导出');
}
